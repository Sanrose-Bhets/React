<!doctype html>
<html>
  <head>
    <title>ChatBot</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput() {
        return (
          <>
            <input
              type="text"
              placeholder="Send a message to the ChatBot"
              size="30"
            />
            <button>Send</button>
          </>
        );
      }

      function ChatMessage({ message, sender }) {
        //const message = props.message;
        //const sender = props.sender;
        //const { message,sender } = props;

        /*if (sender == "chatbot") {
          return (
            <div>
              <img src="robot.png" alt="chatbot Icon" width="50" />
              {message}
            </div>
          );
        }*/

        return (
          <div>
            {sender == "chatbot" && (
              <img src="robot.png" alt="ChatBot Icon" width="50" />
            )}
            {message}
            {sender == "user" && (
              <img src="user.png" alt="User Icon" width="50" />
            )}
          </div>
        );
      }

      function App(){
        return(<>
          <ChatInput />
          <ChatMessage message="Hello Chatbot" sender="user" />
          <ChatMessage message="Hello! How can I help you?" sender="chatbot" />
          <ChatMessage message="todays date" sender="user" />
          <ChatMessage message="Today is July 7" sender="chatbot" />
        </>);
      }

      

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App/>);
    </script>
  </body>
</html>
