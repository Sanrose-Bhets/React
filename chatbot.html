<!doctype html>
<html>
  <head>
    <title>ChatBot</title>
    <style>
      body{
        font-family: Arial, Helvetica, sans-serif;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .sendButton{
        background-color:rgb(25, 135, 84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }
      .chatInput{
        padding: 12px 15px;
        border-radius: 12px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;

      }

      .chatInputContainer{
        display: flex;
        margin-bottom: 60px;
 
      }

      .appContainer{
        max-width: 1000px;
        margin: auto;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .chat_message_user{
        display: flex;
        justify-content: right;
        align-items: start;

      }
      .chat_message_robot{
        display: flex;
        justify-content: left;
        align-items: start;

      }
      .chat_message_text{
        background-color: rgb(238,238,238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
        
        
      }
      .chat_message_profile{
        width: 45px;
      }
      .chatMessagesContainer{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;
      }

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/chatbot.js""></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function ChatInput({chatMessage,setChatMessage}) {
        const [inputText, setInputText] = React.useState("");

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        function sendMessage() {
          const newChatMessage=[
            ...chatMessage,
            {
              message: inputText,
              sender: "user",
              id: crypto.randomUUID(),
            },
          ]

          setChatMessage(newChatMessage);

          const response= Chatbot.getResponse(inputText);

          setChatMessage([
            ...newChatMessage,
            {
              message: response,
              sender: "chatbot",
              id: crypto.randomUUID(),
            },
          ]);
          

          setInputText("");
        }


        return (
          <div className="chatInputContainer">
            <input
              type="text"
              placeholder="Send a message to the ChatBot"
              size="30"
              onChange={saveInputText}
              value={inputText}
              className="chatInput"
            />
            <button onClick={sendMessage}
            className="sendButton">Send</button>
          </div>
        );
      }

      function ChatMessage({ message, sender }) {
        //const message = props.message;
        //const sender = props.sender;
        //const { message,sender } = props;

        /*if (sender == "chatbot") {
          return (
            <div>
              <img src="robot.png" alt="chatbot Icon" width="50" />
              {message}
            </div>
          );
        }*/

        return (
          <div className={
            sender === "user" 
            ? 'chat_message_user'
            :'chat_message_robot'
          }>
            {sender == "chatbot" && (
              <img src="robot.png" alt="ChatBot Icon" className="chat_message_profile"/>
            )}
            <div className="chat_message_text">
              {message}
            </div>
            
            {sender == "user" && (
              <img src="user.png" alt="User Icon" className="chat_message_profile"/>
            )}
          </div>
        );
      }

      function ChatMessages({chatMessage}) {
        const chatMessagesRef=React.useRef(null);

        React.useEffect(()=>{
          const containerElem=chatMessagesRef.current;
          if (containerElem){
            containerElem.scrollTop=containerElem.scrollHeight;
          }
        },[chatMessage]);
         return (
          <div className="chatMessagesContainer" ref={chatMessagesRef}>
            {chatMessage.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </div>
        );
      }

      function App() {
        //lifting the state up AKA making a global variable accross all componenets
        const [chatMessage, setChatMessage] = React.useState([
          { message: "Hello Chatbot", sender: "user", id: "id1" },
          {
            message: "Hello! How can I help you?",
            sender: "chatbot",
            id: "id2",
          },
          { message: "todays date", sender: "user", id: "id3" },
          { message: "Today is July 7", sender: "chatbot", id: "id4" },
        ]);
        //array destructuring, the order ALWAYS MATTERS
        //const [chatMessage, setChatMessage] = array;
        //const chatMessage = array[0];
        //const setChatMessage = array[1];
        return (
          <div className="appContainer">
            
            <ChatMessages 
              chatMessage={chatMessage}
              
            
            />
            <ChatInput 
              chatMessage={chatMessage}
              setChatMessage={setChatMessage}
            />
          </div>
        );
      }

      const container = document.querySelector(".js-container");
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
